name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: ${{ matrix.os }} / .NET ${{ matrix.dotnet }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['8.0.x', '9.0.x', '10.0.x']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore dependencies
        run: dotnet restore ColorExtractor.Net.slnx

      - name: Build
        run: dotnet build ColorExtractor.Net.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/ColorExtractor.Net.Tests --configuration Release --no-build --verbosity normal
